run:
  timeout: 5m
  tests: true

linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - typecheck
    - unused
    - gocyclo
    - gocritic
    - gosec
    - misspell
    - nakedret
    - prealloc
    - unconvert
    - unparam

linters-settings:
  gocyclo:
    min-complexity: 15
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - whyNoLint
      - wrapperFunc
  gosec:
    excludes:
      - G104 # Duplicate of errcheck
  govet:
    enable-all: true
    disable:
      - fieldalignment # Too strict for general use
      - shadow # Often false positives

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
