# Benchmark Workflow
# This workflow runs Go benchmarks on pull requests and compares results against main.
# It helps detect performance regressions before they are merged.

name: Benchmark

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: # Allow manual triggers

# Ensure only one benchmark runs at a time per branch
concurrency:
  group: benchmark-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run benchmarks
        run: |
          echo "Running Fibonacci algorithm benchmarks..."
          go test -bench=. -benchmem -count=5 -benchtime=1s ./internal/fibonacci/ | tee benchmark-fibonacci.txt
          
          echo ""
          echo "Running server benchmarks..."
          go test -bench=. -benchmem -count=3 -benchtime=500ms ./internal/server/ | tee benchmark-server.txt
          
          echo ""
          echo "Running bigfft benchmarks..."
          go test -bench=. -benchmem -count=3 -benchtime=500ms ./internal/bigfft/ | tee benchmark-bigfft.txt
          
          # Combine all benchmarks
          cat benchmark-fibonacci.txt benchmark-server.txt benchmark-bigfft.txt > benchmark.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Go Benchmark
          tool: 'go'
          output-file-path: benchmark.txt
          # Only save results for main branch pushes
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          # Comment on PRs with benchmark comparison
          comment-on-alert: true
          # Fail if performance regresses by more than 50%
          fail-on-alert: true
          alert-threshold: '150%'
          # Alert if performance degrades by more than 20%
          alert-comment-cc-users: '@${{ github.actor }}'
          # GitHub token for comments and gh-pages push
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Where to store benchmark data
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark*.txt
          retention-days: 30

  # Additional job for more detailed analysis on main branch
  benchmark-analysis:
    name: Benchmark Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: benchmark
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run detailed benchmarks
        run: |
          # Run benchmarks multiple times for statistical analysis
          for i in 1 2 3 4 5; do
            echo "=== Run $i ===" >> detailed-benchmark.txt
            go test -bench=. -benchmem ./internal/fibonacci/ >> detailed-benchmark.txt 2>&1
          done

      - name: Analyze benchmark results
        run: |
          echo "## Benchmark Statistics" > analysis.md
          echo "" >> analysis.md
          echo "Generated on $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> analysis.md
          echo "" >> analysis.md
          echo '```' >> analysis.md
          benchstat detailed-benchmark.txt >> analysis.md 2>&1 || true
          echo '```' >> analysis.md
          
          cat analysis.md

      - name: Upload analysis
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-analysis
          path: |
            detailed-benchmark.txt
            analysis.md
          retention-days: 90

  # Memory profiling job (runs less frequently)
  memory-profile:
    name: Memory Profile
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run memory benchmarks
        run: |
          echo "Memory allocation analysis for Fibonacci algorithms"
          echo "===================================================="
          
          # Run benchmarks with allocation stats
          go test -bench=. -benchmem -memprofile=mem.prof ./internal/fibonacci/
          
          # Analyze memory profile
          go tool pprof -text -alloc_space mem.prof > memory-analysis.txt
          
          echo ""
          echo "Top memory allocations:"
          head -50 memory-analysis.txt

      - name: Upload memory profile
        uses: actions/upload-artifact@v4
        with:
          name: memory-profile
          path: |
            mem.prof
            memory-analysis.txt
          retention-days: 30

